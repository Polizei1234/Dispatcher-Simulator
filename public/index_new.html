<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatcher Simulator - Refactored</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>
    <div id="game-container">
        <div class="main-content">
            <aside class="sidebar-left" style="width: 350px;">
                <div class="panel" style="height: 100%;">
                    <div class="panel-header">
                        <h3><i class="fas fa-list"></i> Aktive Einsätze</h3>
                        <span class="badge" id="incident-count">0</span>
                    </div>
                    <div class="panel-content" id="incident-list" style="height: calc(100% - 60px); overflow-y: auto;"></div>
                </div>
            </aside>

            <main class="map-container" style="flex: 1;">
                <div id="map"></div>
            </main>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
