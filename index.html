<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatcher Simulator - ILS Waiblingen</title>
    
    <!-- Externe Libraries (später via Webpack/npm managen) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Gebündeltes App-CSS -->
    <link rel="stylesheet" href="dist/css/styles.css">
</head>
<body>
    <!-- Welcome Screen -->
    <div id="welcome-screen" class="overlay active">
        <div class="welcome-container">
            <h1><i class="fas fa-headset"></i> Dispatcher Simulator</h1>
            <h2>ILS Waiblingen - Rems-Murr-Kreis</h2>
            <div class="welcome-buttons" style="margin-top: 20px;">
                <button id="start-free-game" class="btn btn-success"><i class="fas fa-infinity"></i> Freies Spiel</button>
            </div>
            <div id="version-badge" style="position: absolute; bottom: 15px; right: 20px; padding: 8px 15px; background: rgba(76, 175, 80, 0.2); border: 1px solid rgba(76, 175, 80, 0.5); border-radius: 20px; font-size: 0.85em; color: #66bb6a;">
                <i class="fas fa-code-branch"></i> <strong id="version-text">v10.0.0</strong>
            </div>
        </div>
    </div>

    <!-- Main Game Container (initial versteckt) -->
    <div id="game-container" class="hidden">
         <header>
            <div class="header-left">
                <h1><i class="fas fa-headset"></i> Dispatcher Simulator</h1>
                <span id="current-time">00:00:00</span>
            </div>
            <div class="header-right">
                <span><i class="fas fa-ambulance"></i> <span id="active-vehicles">0</span>/<span id="total-vehicles">0</span></span>
                <button id="radio-toggle-btn" class="btn btn-small" title="Funkverkehr öffnen">
                    <i class="fas fa-broadcast-tower"></i> Funk
                </button>
            </div>
        </header>
        <div id="map"></div>
        <div id="incident-list"></div>
        <!-- ... weitere UI-Elemente wie Funkpanel etc. -->
    </div>

    <!-- Externe Libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <!-- Gebündeltes App-JS -->
    <script src="dist/js/main.bundle.js"></script>

</body>
</html>
